version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: link-shortcut-db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:${DB_PORT}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - link-shortcut-network
    restart: unless-stopped

  django:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: link-shortcut-django
    command: >
      sh -c "python manage.py makemigrations main &&
             python manage.py migrate main &&
             python manage.py runserver ${RUNSERVER_URL}"
    ports:
      - "${APP_PORT}:${APP_PORT}"
    environment:
      DB_HOST: postgres
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_DEBUG: ${DJANGO_DEBUG}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS}
      BASE_URL: ${BASE_URL}
    volumes:
      - ./:/app
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - link-shortcut-network
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: link-shortcut-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "${PGADMIN_PORT}:${PGADMIN_PORT}"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - link-shortcut-network
    restart: unless-stopped
    profiles:
      - dev
      - pgadmin

volumes:
  postgres_data:
  pgadmin_data:

networks:
  link-shortcut-network:
    driver: bridge